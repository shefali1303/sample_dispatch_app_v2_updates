<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sample Dispatch Dashboard</title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header class="app-header">
  <div class="brand">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Medikonda Logo">

    <div class="brand-text">
      <div class="brand-title">Medikonda Sample Dispatch Form</div>
      <div class="brand-subtitle">Secure storage, automated emails, and full traceability.</div>
    </div>
  </div>
</header>
  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
